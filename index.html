<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Teste de Mapa Base</title>
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Controles do mapa">
        <div class="brand-block">
          <p class="eyebrow">Teste basico</p>
          <h1>Mapa Base</h1>
        </div>

        <div class="status-card">
          <span class="status-dot ready" id="loadDot"></span>
          <span id="loadStatus">Mapa base carregado.</span>
        </div>

        <form id="towerForm" class="tower-form">
          <div class="form-header">
            <h2>Pontos de observacao</h2>
            <button type="button" id="addTower" class="ghost-button">Adicionar ponto</button>
          </div>

          <label class="range-control">
            <span>Alcance padrao (km)</span>
            <input id="rangeKm" name="rangeKm" type="number" step="0.1" inputmode="decimal" min="0.1" value="25" required>
          </label>

          <div id="towerRows" class="tower-rows"></div>

          <button type="submit" class="primary-button">Aplicar</button>
        </form>

        <div class="summary-grid compact-summary" aria-live="polite">
          <div>
            <span class="summary-label">Alcance</span>
            <strong id="rangeSummary">25 km</strong>
          </div>
          <div>
            <span class="summary-label">Cruzamentos</span>
            <strong id="intersectionCount">0</strong>
          </div>
        </div>
      </section>

      <section class="map-stage" aria-label="Mapa">
        <div id="map"></div>
        <div class="map-hint">
          Pressione Ctrl para capturar uma coordenada. Pressione Shift para rotacionar a linha desejada.
        </div>
        <div class="map-legend">
          <span><i class="line-swatch"></i> Linha de observacao</span>
          <span><i class="point-swatch"></i> Cruzamento</span>
        </div>
      </section>
    </main>

    <template id="towerTemplate">
      <article class="tower-row">
        <div class="tower-row-title">
          <strong class="tower-name">Ponto</strong>
          <button type="button" class="icon-button remove-tower" title="Excluir coordenada" aria-label="Excluir coordenada">x</button>
        </div>
        <label>
          <span>Longitude</span>
          <input name="x" type="number" step="0.000001" inputmode="decimal" min="-180" max="180" placeholder="Ex.: -51.234567" required>
        </label>
        <label>
          <span>Latitude</span>
          <input name="y" type="number" step="0.000001" inputmode="decimal" min="-90" max="90" placeholder="Ex.: -15.234567" required>
        </label>
        <label>
          <span>Angulo norte</span>
          <input name="angle" type="number" step="0.01" inputmode="decimal" min="0" max="360" placeholder="0 a 360" required>
        </label>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/proj4@2.10.0/dist/proj4.js"></script>
    <script src="app.js"></script>
  </body>
</html>
